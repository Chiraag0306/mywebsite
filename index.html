<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Website</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }
        header {
            background: #111;
            color: white;
            padding: 15px;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        button {
            padding: 10px 20px;
            background: black;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <h1>Welcome to My Website 🚀</h1>
</header>

<div class="container">
    <p>This is my first deployed website.</p>
    <button onclick="showMessage()">Click Me</button>
</div>

<script>
    function showMessage() {
        alert("Website is working!");
    }
</script>

</body>
</html>
